<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
<rect width="1600" height="620" fill="#F8FAFC"/>
<text x="48" y="60" font-family="Microsoft YaHei,Arial,sans-serif" font-size="28" font-weight="700" fill="#172033" text-anchor="start">运行时信号驱动的上游执行闭环</text>
<text x="50" y="88" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start">一个 AI_EMBED 查询贯穿数据批次、提交门控、模型服务队列、写回约束和端到端反馈。</text>
<rect x="58" y="142" width="165" height="116" rx="9" fill="#F2ECFF" stroke="#7C3AED" stroke-width="2"/>
<text x="72" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="start">SQL 入口</text>
<text x="72" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">SELECT AI_EMBED(text)</text>
<text x="72" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">FROM documents</text>
<rect x="278" y="142" width="165" height="116" rx="9" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="2"/>
<text x="292" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#2F6FEB" text-anchor="start">数据批次队列</text>
<text x="292" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">观测量：行数/长度</text>
<text x="292" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">调节项：批量/分区</text>
<rect x="498" y="142" width="165" height="116" rx="9" fill="#FFF1E6" stroke="#F97316" stroke-width="2"/>
<text x="512" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#F97316" text-anchor="start">提交门控</text>
<text x="512" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">观测量：在途任务</text>
<text x="512" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">调节项：并发上限</text>
<rect x="718" y="142" width="165" height="116" rx="9" fill="#FFF1E6" stroke="#F97316" stroke-width="2"/>
<text x="732" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#F97316" text-anchor="start">模型服务队列</text>
<text x="732" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">观测量：积压/等待</text>
<text x="732" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">调节项：routing policy</text>
<rect x="938" y="142" width="165" height="116" rx="9" fill="#FFFFFF" stroke="#F97316" stroke-width="2"/>
<text x="952" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#F97316" text-anchor="start">GPU 模型服务</text>
<text x="952" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">观测量：模型耗时</text>
<text x="952" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">判定项：是否饱和</text>
<rect x="1158" y="142" width="165" height="116" rx="9" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
<text x="1172" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#16A34A" text-anchor="start">结果与写回</text>
<text x="1172" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">观测量：写回占比</text>
<text x="1172" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">约束项：写回批量</text>
<rect x="1378" y="142" width="178" height="116" rx="9" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
<text x="1392" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#16A34A" text-anchor="start">端到端指标</text>
<text x="1392" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">评价项：耗时/P99</text>
<text x="1392" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">判定项：整体收益</text>
<line x1="227" y1="200" x2="270" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="270,200 262,195 262,205" fill="#334155"/>
<line x1="447" y1="200" x2="490" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="490,200 482,195 482,205" fill="#334155"/>
<line x1="667" y1="200" x2="710" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="710,200 702,195 702,205" fill="#334155"/>
<line x1="887" y1="200" x2="930" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="930,200 922,195 922,205" fill="#334155"/>
<line x1="1107" y1="200" x2="1150" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="1150,200 1142,195 1142,205" fill="#334155"/>
<line x1="1327" y1="200" x2="1370" y2="200" stroke="#334155" stroke-width="3"/>
<polygon points="1370,200 1362,195 1362,205" fill="#334155"/>
<rect x="278" y="292" width="165" height="58" rx="7" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="1"/>
<text x="288" y="314" font-family="Microsoft YaHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#2F6FEB" text-anchor="start">计划层决策</text>
<text x="288" y="339" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#172033" text-anchor="start">批量 / 分区</text>
<rect x="498" y="292" width="165" height="58" rx="7" fill="#FFF1E6" stroke="#F97316" stroke-width="1"/>
<text x="508" y="314" font-family="Microsoft YaHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#F97316" text-anchor="start">运行层决策</text>
<text x="508" y="339" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#172033" text-anchor="start">K_max</text>
<rect x="718" y="292" width="165" height="58" rx="7" fill="#FFF1E6" stroke="#F97316" stroke-width="1"/>
<text x="728" y="314" font-family="Microsoft YaHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#F97316" text-anchor="start">运行层决策</text>
<text x="728" y="339" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#172033" text-anchor="start">routing policy</text>
<rect x="938" y="292" width="165" height="58" rx="7" fill="#FFF1E6" stroke="#F97316" stroke-width="1"/>
<text x="948" y="314" font-family="Microsoft YaHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#F97316" text-anchor="start">服务端决策</text>
<text x="948" y="339" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#172033" text-anchor="start">micro-batch</text>
<rect x="1158" y="292" width="165" height="58" rx="7" fill="#F0FDF4" stroke="#16A34A" stroke-width="1"/>
<text x="1168" y="314" font-family="Microsoft YaHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#16A34A" text-anchor="start">保护约束</text>
<text x="1168" y="339" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#172033" text-anchor="start">写回占比</text>
<rect x="278" y="420" width="1052" height="72" rx="10" fill="#FFF7D6" stroke="#B7791F" stroke-width="2"/>
<text x="804" y="449" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#B7791F" text-anchor="middle">策略控制器：计划层 + 运行层 + 服务端批处理</text>
<text x="804" y="476" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="middle">执行前定数据批次；运行中调门控/路由；服务端形成 micro-batch</text>
