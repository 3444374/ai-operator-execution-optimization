<text x="50" y="88" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="400" fill="#334155" text-anchor="start">一个 AI_COMPLETE 查询贯穿数据批次、提交门控、模型服务队列、写回约束和端到端反馈。</text>
<rect x="58" y="142" width="175" height="116" rx="9" fill="#F2ECFF" stroke="#7C3AED" stroke-width="2"/>
<text x="72" y="172" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="start">SQL 入口</text>
<text x="72" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">AI_COMPLETE(prompt)</text>
<text x="72" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">FROM documents</text>
