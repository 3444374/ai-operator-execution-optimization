<text x="512" y="203" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">观测：模型服务队列深度</text>
<text x="512" y="225" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">调节：flush 时机/K_max</text>
