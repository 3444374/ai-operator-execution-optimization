<polygon points="581,362 576,370 586,370" fill="#475569"/>
<polyline points="801,420 801,362" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="9 6"/>

<polygon points="801,362 796,370 806,370" fill="#475569"/>
<polyline points="1021,420 1021,362" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="9 6"/>

<polygon points="1021,362 1016,370 1026,370" fill="#475569"/>
<polyline points="1241,420 1241,362" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="9 6"/>

<polygon points="1241,362 1236,370 1246,370" fill="#475569"/>
<text x="50" y="576" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">图注：不重切数据库侧已物化批次；动态 batch 位于模型服务侧，请求队列按等待时间、token/shape 预算形成推理 micro-batch。</text>
</svg>