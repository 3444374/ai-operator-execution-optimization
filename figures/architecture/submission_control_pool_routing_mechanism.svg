<text x="674" y="224" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#172033" text-anchor="start">token 量 / prefix</text>
<text x="674" y="248" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#172033" text-anchor="start">到达压力 / 任务类型</text>
<text x="662" y="465" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#16A34A" text-anchor="start">验证：分组尾延迟、队列均衡、prefix locality 与吞吐</text>
<text x="48" y="501" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#536276" text-anchor="start">图注建议：分池路由把“发给谁”纳入提交控制；箭头表示从形态判别器到目标 pool 的明确路由关系。</text>
