<text x="342" y="200" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#172033" text-anchor="start">所有请求共用参数</text>
<text x="342" y="224" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#172033" text-anchor="start">K_max / flush 均相同</text>
<text x="342" y="250" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#DC2626" text-anchor="start">短长请求相互影响</text>
