<text x="92" y="375" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#DC2626" text-anchor="start">风险：一种策略同时服务低延迟、长尾吞吐和前缀局部性需求</text>
<rect x="654" y="170" width="158" height="116" rx="8" ry="8" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
