<text x="40" y="388" font-family="Microsoft YaHei,SimHei,sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Key: Replace fixed row count with token accumulation. Short rows pack more per batch; long rows get dedicated batches.</text>
