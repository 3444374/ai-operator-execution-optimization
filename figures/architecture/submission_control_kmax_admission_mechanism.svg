<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="470" viewBox="0 0 1150 470">
<rect width="1150" height="470" fill="#F8FAFC"/>
<text x="575" y="40" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="26" font-weight="bold" fill="#172033" text-anchor="middle">提交控制策略一：K_max 准入控制</text>
<text x="575" y="61" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="14" font-weight="normal" fill="#475569" text-anchor="middle">候选机制：限制同时在飞请求数上界，防止单任务独占模型服务资源</text>
<rect x="45" y="80" width="495" height="298" rx="10" ry="10" fill="#FEF2F2"/>
<rect x="610" y="80" width="495" height="298" rx="10" ry="10" fill="#F0FDF4"/>
<text x="67" y="114" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="16" font-weight="bold" fill="#172033" text-anchor="start">无准入控制：所有请求同时进入</text>
<text x="632" y="114" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="16" font-weight="bold" fill="#172033" text-anchor="start">K_max = 4 准入控制：槽位轮转</text>
<rect x="73" y="128" width="140" height="62" rx="8" ry="8" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
<text x="143" y="158" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="normal" fill="#2F6FEB" text-anchor="middle">Ray Actor</text>
<text x="88" y="178" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#172033" text-anchor="start">生成 16 请求</text>
<text x="88" y="194" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#172033" text-anchor="start">全部立即发送</text>
