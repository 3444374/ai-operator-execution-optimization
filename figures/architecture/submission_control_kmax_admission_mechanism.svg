<rect x="889" y="164" width="128" height="22" rx="5" ry="5" fill="#16A34A"/>
<text x="953" y="181" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#FFFFFF" text-anchor="middle">K_max = 4  准入门控</text>
<rect x="852" y="200" width="20" height="20" rx="4" ry="4" fill="#16A34A"/>
<rect x="878" y="200" width="20" height="20" rx="4" ry="4" fill="#16A34A"/>
