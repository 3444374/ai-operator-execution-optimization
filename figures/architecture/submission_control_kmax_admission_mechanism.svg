<text x="285" y="208" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#DC2626" text-anchor="start">in-flight 满载 (8/8)</text>
<rect x="285" y="212" width="20" height="16" rx="4" ry="4" fill="#F97316"/>
<rect x="311" y="212" width="20" height="16" rx="4" ry="4" fill="#F97316"/>
