<text x="48" y="471" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#536276" text-anchor="start">图注建议：在途上限准入控制把提交控制从“发完即算”改为有界窗口；K_max 需与上游 batch 形态联合消融。</text>
