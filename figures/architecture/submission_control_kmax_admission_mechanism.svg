<rect x="1034" y="200" width="20" height="20" rx="4" ry="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
<text x="838" y="240" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#16A34A" text-anchor="start">4 在飞 + 4 空闲</text>
<rect x="870" y="244" width="20" height="14" rx="4" ry="4" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="1"/>
<rect x="896" y="244" width="20" height="14" rx="4" ry="4" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="1"/>
<rect x="922" y="244" width="20" height="14" rx="4" ry="4" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="1"/>
<rect x="948" y="244" width="20" height="14" rx="4" ry="4" fill="#E7F0FF" stroke="#2F6FEB" stroke-width="1"/>
<text x="838" y="276" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#2F6FEB" text-anchor="start">剩余请求排队轮转</text>
<text x="638" y="333" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#16A34A" text-anchor="start">效果：预留槽位 → 多任务不饥饿</text>
<text x="638" y="355" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#16A34A" text-anchor="start">上界约束使尾部可控；K_max 与 batch 形状需耦合配置</text>
<text x="45" y="450" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="normal" fill="#475569" text-anchor="start">图注建议：该图说明 K_max 如何通过限制同时在飞请求数来控制单任务的资源占用；最优 K_max 与 batch 形状耦合，需通过 b18/b24 消融实验确定。</text>
</svg>