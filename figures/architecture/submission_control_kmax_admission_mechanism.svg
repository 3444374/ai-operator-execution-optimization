<rect x="389" y="212" width="20" height="16" rx="4" ry="4" fill="#F97316"/>
<text x="285" y="248" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#F97316" text-anchor="start">队列积压 5+</text>
<text x="73" y="333" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#DC2626" text-anchor="start">问题：in-flight 窗口被单任务填满，其他任务饥饿</text>
<text x="73" y="355" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#DC2626" text-anchor="start">无上界 → 尾部膨胀，共享场景下公平性丧失</text>
<line x1="555" y1="234" x2="585" y2="234" stroke="#334155" stroke-width="3"/><polygon points="585,234 575,228 575,240" fill="#334155"/>
<rect x="630" y="128" width="142" height="62" rx="8" ry="8" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
