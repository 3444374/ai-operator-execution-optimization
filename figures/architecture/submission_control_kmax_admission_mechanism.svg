<text x="701" y="180" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#FFFFFF" text-anchor="middle">max_inflight = 4</text>
<line x1="778" y1="159" x2="818" y2="159" stroke="#334155" stroke-width="3"/><polygon points="818,159 808,153 808,165" fill="#334155"/>
