<text x="45" y="470" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="normal" fill="#475569" text-anchor="start">图注建议：该图说明队列自适应提交的闭环逻辑——actor 轮询 vLLM 队列状态后动态调节发送量；当前实现（二段式 min/max K_max + 阈值）效果不如静态 K_max=8，详见 b24/b25。</text>
