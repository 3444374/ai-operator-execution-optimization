<text x="87" y="206" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#172033" text-anchor="start">或每 N 行触发 flush</text>
<text x="87" y="232" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#DC2626" text-anchor="start">→ 不关心下游状态</text>
<rect x="87" y="246" width="122" height="36" rx="6" ry="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
<text x="148" y="270" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#475569" text-anchor="middle">定时器 / 行计数器</text>
<line x1="231" y1="213" x2="277" y2="213" stroke="#334155" stroke-width="3"/><polygon points="277,213 267,207 267,219" fill="#334155"/>
<rect x="283" y="128" width="235" height="170" rx="8" ry="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1"/>
