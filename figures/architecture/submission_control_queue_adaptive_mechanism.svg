<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500">
<rect width="1180" height="500" fill="#FFFFFF"/>
<text x="590.0" y="44" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">提交控制策略一：队列自适应提交</text>
<text x="590.0" y="68" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="14" font-weight="400" fill="#536276" text-anchor="middle">提交时机：根据服务入口压力调节 flush 节奏</text>
<rect x="48" y="94" width="514" height="320" rx="10" ry="10" fill="#F8FAFC" stroke="#D9E0EA" stroke-width="1"/>
<rect x="68" y="114" width="5" height="280" rx="2" ry="2" fill="#94A3B8"/>
<text x="86" y="133" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">固定节奏：提交与服务状态脱节</text>
<rect x="618" y="94" width="514" height="320" rx="10" ry="10" fill="#F8FAFC" stroke="#D9E0EA" stroke-width="1"/>
<rect x="638" y="114" width="5" height="280" rx="2" ry="2" fill="#2F6FEB"/>
<text x="656" y="133" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">闭环提交：观测队列后再发送</text>
<line x1="580" y1="254" x2="600" y2="254" stroke="#334155" stroke-width="3"/><polygon points="600,254 589,248 589,260" fill="#334155"/>
<rect x="88" y="158" width="152" height="127" rx="8" ry="8" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
