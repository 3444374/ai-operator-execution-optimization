<rect x="433.5" y="250" width="16" height="14" rx="4" ry="4" fill="#DC2626"/>
<rect x="456.5" y="250" width="16" height="14" rx="4" ry="4" fill="#DC2626"/>
<line x1="240" y1="220" x2="314" y2="220" stroke="#334155" stroke-width="3"/><polygon points="314,220 303,214 303,226" fill="#334155"/>
<text x="92" y="357" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#DC2626" text-anchor="start">风险：空闲阶段吞吐不足，拥塞阶段尾延迟放大</text>
