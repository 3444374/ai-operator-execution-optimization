<text x="303" y="167" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#16A34A" text-anchor="start">队列空闲时</text>
<text x="303" y="190" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#16A34A" text-anchor="start">→ 浪费吞吐机会</text>
<rect x="293" y="218" width="215" height="68" rx="6" ry="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1"/>
<text x="303" y="243" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#DC2626" text-anchor="start">队列积压时</text>
<text x="303" y="266" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="normal" fill="#DC2626" text-anchor="start">→ 继续塞入，加剧拥塞</text>
