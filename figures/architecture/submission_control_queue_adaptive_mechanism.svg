<text x="106" y="208" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#172033" text-anchor="start">定时或按行数触发</text>
<text x="106" y="232" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#DC2626" text-anchor="start">不读取下游状态</text>
<rect x="106" y="244" width="108" height="26" rx="5" ry="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
<text x="160.0" y="260" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#536276" text-anchor="middle">固定 flush</text>
