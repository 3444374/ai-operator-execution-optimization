<line x1="884" y1="284" x2="818" y2="284" stroke="#16A34A" stroke-width="2"/><polygon points="818,284 829,278 829,290" fill="#16A34A"/>
<text x="662" y="357" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="400" fill="#16A34A" text-anchor="start">验证：queue wait、P95/P99、tokens/s、端到端耗时</text>
<text x="48" y="471" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#536276" text-anchor="start">图注建议：队列自适应提交把固定 flush 改为状态反馈机制；该图说明候选机制，最终需通过队列压力和尾延迟消融验证。</text>
