<text x="632" y="114" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="16" font-weight="bold" fill="#172033" text-anchor="start">队列自适应提交：闭环反馈</text>
<rect x="73" y="128" width="150" height="170" rx="8" ry="8" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
<text x="148" y="158" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="12" font-weight="normal" fill="#2F6FEB" text-anchor="middle">Ray Actor</text>
