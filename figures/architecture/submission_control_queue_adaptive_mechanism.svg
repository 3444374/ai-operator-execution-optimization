<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="510" viewBox="0 0 1150 510">
<rect width="1150" height="510" fill="#F8FAFC"/>
<text x="575" y="40" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="26" font-weight="bold" fill="#172033" text-anchor="middle">提交控制策略二：队列自适应提交</text>
<text x="575" y="61" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="14" font-weight="normal" fill="#475569" text-anchor="middle">候选机制：Ray actor 感知 vLLM 队列状态，动态调节请求发送节奏</text>
<rect x="45" y="80" width="495" height="338" rx="10" ry="10" fill="#FEF2F2"/>
<rect x="610" y="80" width="495" height="338" rx="10" ry="10" fill="#F0FDF4"/>
