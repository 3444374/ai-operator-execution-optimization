<text x="73" y="393" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="11" font-weight="normal" fill="#DC2626" text-anchor="start">→ 空闲时吞吐不足，拥塞时加剧尾部延迟</text>
