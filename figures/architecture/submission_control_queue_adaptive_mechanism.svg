<text x="332" y="174" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="14" font-weight="700" fill="#DC2626" text-anchor="start">服务入口队列</text>
<text x="336" y="196" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#16A34A" text-anchor="start">空闲时仍等待</text>
<text x="336" y="242" font-family="Microsoft YaHei,SimHei,Arial,sans-serif" font-size="10" font-weight="400" fill="#DC2626" text-anchor="start">拥塞时继续塞入</text>
