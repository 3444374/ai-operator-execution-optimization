<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1150" width="1400" height="1150">
<style>text{font-family:"Microsoft YaHei","SimHei",Arial,sans-serif}.h1{font-size:26px;font-weight:bold;fill:#1E293B}.sub{font-size:11px;fill:#94A3B8}.h2{font-size:18px;font-weight:bold}.h3{font-size:16px;font-weight:bold;fill:#1E293B}.card{font-size:14px;font-weight:bold}.body{font-size:12px;fill:#1E293B}.small{font-size:11px;fill:#1E293B}.anno{font-size:12px;font-weight:bold}.src{font-size:10px;fill:#94A3B8}</style>
<rect width="1400" height="1150" fill="white"/>
<text x="700" y="44" text-anchor="middle" class="h1" fill="#1E293B">进程内 UDF  vs  进程外执行链路：「内部」到底指什么</text>
<text x="700" y="70" text-anchor="middle" class="sub" fill="#94A3B8">虚线框 = OS 进程边界。推理算在框内还是框外，与 GPU 在不在公司内部是两件事</text>
<text x="40" y="115" class="h2" fill="#7C3AED">① 进程内 UDF：推理是数据库进程里的一个函数调用</text>
<text x="1360" y="119" text-anchor="end" class="sub">对照路线：PostgresML (pgml.embed) · GaussML</text>
<rect x="40" y="140" width="1320" height="260" fill="none" stroke="#7C3AED" stroke-width="2" stroke-dasharray="8,5"/>
<text x="700" y="168" text-anchor="middle" class="anno" fill="#7C3AED">数据库进程（单个 OS 进程）—— 虚线 = 进程边界</text>
<rect x="80" y="200" width="340" height="130" rx="8" fill="white" stroke="#475569" stroke-width="2"/>
<text x="250" y="224" text-anchor="middle" class="card" fill="#475569">SQL 执行器</text>
<line x1="92" y1="236" x2="408" y2="236" stroke="#E2E8F0"/>
<text x="250" y="258" text-anchor="middle" class="body" fill="#1E293B">SELECT pgml.embed(text)</text>
<text x="250" y="276" text-anchor="middle" class="body" fill="#1E293B">FROM documents</text>
<text x="250" y="294" text-anchor="middle" class="body" fill="#1E293B">（数据在进程内读取）</text>
<line x1="426" y1="265" x2="524" y2="265" stroke="#94A3B8" stroke-width="2" marker-end="url(#ag)"/>
<rect x="530" y="200" width="340" height="130" rx="8" fill="white" stroke="#7C3AED" stroke-width="2"/>
<text x="700" y="224" text-anchor="middle" class="card" fill="#7C3AED">UDF 调用（进程内函数）</text>
<line x1="542" y1="236" x2="858" y2="236" stroke="#E2E8F0"/>
<text x="700" y="258" text-anchor="middle" class="body" fill="#1E293B">像调用 SUM() / COUNT() 一样</text>
<text x="700" y="276" text-anchor="middle" class="body" fill="#1E293B">直接函数调用</text>
<text x="700" y="294" text-anchor="middle" class="body" fill="#1E293B">无序列化 · 无网络往返</text>
<line x1="876" y1="265" x2="974" y2="265" stroke="#94A3B8" stroke-width="2" marker-end="url(#ag)"/>
<rect x="980" y="200" width="340" height="130" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
<text x="1150" y="224" text-anchor="middle" class="card" fill="#2563EB">模型推理</text>
<line x1="992" y1="236" x2="1308" y2="236" stroke="#E2E8F0"/>
<text x="1150" y="258" text-anchor="middle" class="body" fill="#1E293B">模型驻留在数据库进程内</text>
<text x="1150" y="276" text-anchor="middle" class="body" fill="#1E293B">GPU 通过进程内绑定访问</text>
<text x="1150" y="294" text-anchor="middle" class="body" fill="#1E293B">（如 PyTorch / ONNX 进程内加载）</text>
<text x="700" y="360" text-anchor="middle" class="anno" fill="#16A34A">✓ 数据从不穿过进程边界 —— 模型对 SQL 引擎而言就是一个内置函数</text>
<defs><marker id="ag" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#94A3B8"/></marker></defs>
<defs><marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#DC2626"/></marker></defs>
<text x="40" y="447" class="h2" fill="#F97316">② 进程外执行链路：数据离开数据库进程，经调度到达推理服务，再写回</text>
<text x="1360" y="451" text-anchor="end" class="sub">本课题路线：Cortex / 达梦+Ray+公司内部 GPU / pgai+OpenAI</text>
<rect x="40" y="475" width="330" height="270" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,5"/>
<text x="205" y="501" text-anchor="middle" class="anno" fill="#475569">数据库进程</text>
<rect x="60" y="515" width="290" height="75" rx="8" fill="white" stroke="#475569" stroke-width="2"/>
<text x="205" y="537" text-anchor="middle" class="card" fill="#475569">SQL 执行器</text>
<line x1="70" y1="545" x2="340" y2="545" stroke="#E2E8F0"/>
<text x="205" y="561" text-anchor="middle" class="small" fill="#1E293B">AI_COMPLETE(prompt)</text>
<text x="205" y="576" text-anchor="middle" class="small" fill="#1E293B">读取表数据</text>
<rect x="60" y="645" width="290" height="75" rx="8" fill="white" stroke="#475569" stroke-width="2"/>
<text x="205" y="667" text-anchor="middle" class="card" fill="#475569">结果写回</text>
<line x1="70" y1="675" x2="340" y2="675" stroke="#E2E8F0"/>
<text x="205" y="691" text-anchor="middle" class="small" fill="#1E293B">COPY / INSERT 写回</text>
<text x="205" y="706" text-anchor="middle" class="small" fill="#1E293B">向量索引（可选）</text>
<rect x="470" y="545" width="280" height="125" rx="8" fill="white" stroke="#F97316" stroke-width="2"/>
<text x="610" y="569" text-anchor="middle" class="card" fill="#F97316">调度层（上游）</text>
<line x1="482" y1="581" x2="738" y2="581" stroke="#E2E8F0"/>
<text x="610" y="603" text-anchor="middle" class="body" fill="#1E293B">Ray / Daft</text>
<text x="610" y="623" text-anchor="middle" class="body" fill="#1E293B">batch · 路由 · 并发控制</text>
<text x="610" y="643" text-anchor="middle" class="body" fill="#1E293B">（本课题优化对象）</text>
<rect x="800" y="545" width="300" height="125" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
<text x="950" y="569" text-anchor="middle" class="card" fill="#2563EB">推理服务</text>
<line x1="812" y1="581" x2="1088" y2="581" stroke="#E2E8F0"/>
<text x="950" y="603" text-anchor="middle" class="body" fill="#1E293B">vLLM · GPU</text>
<text x="950" y="623" text-anchor="middle" class="body" fill="#1E293B">（可在公司内部 或 公网）</text>
<text x="950" y="643" text-anchor="middle" class="body" fill="#1E293B">与在哪无关——只要在框外</text>
<line x1="350" y1="547" x2="470" y2="570" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>
<text x="410" y="552" text-anchor="middle" class="small" fill="#DC2626">Arrow 序列化 · 出进程</text>
<line x1="750" y1="607" x2="800" y2="607" stroke="#94A3B8" stroke-width="2" marker-end="url(#ar)"/>
<text x="775" y="601" text-anchor="middle" class="small" fill="#94A3B8">数据 + batch</text>
<line x1="800" y1="650" x2="350" y2="687" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>
<text x="575" y="682" text-anchor="middle" class="small" fill="#DC2626">结果 · 回进程写回</text>
<rect x="40" y="760" width="1320" height="30" rx="6" fill="#FEF2F2" stroke="#DC2626"/>
<text x="700" y="780" text-anchor="middle" class="anno" fill="#DC2626">✗ 数据必须穿过进程边界（虚线框）两次：出去推理 + 回来写回 —— 这就是「进程外」</text>
<text x="700" y="826" text-anchor="middle" class="h3" fill="#1E293B">③ 两个「内部」是正交的维度——别混为一谈</text>
<text x="775" y="859" text-anchor="middle" class="anno" fill="#1E293B">架构边界：推理在哪算 →</text>
<text x="386" y="883" class="small" fill="#7C3AED">进程内（DB 进程里算）</text>
<text x="781" y="883" class="small" fill="#F97316">进程外（DB 进程外算）</text>
<text x="305" y="917" text-anchor="middle" class="anno" fill="#1E293B">物理位置：</text>
<text x="305" y="935" text-anchor="middle" class="small" fill="#94A3B8">GPU / 资源在哪 ↓</text>
<rect x="230" y="901" width="150" height="78" fill="#F1F5F9"/>
<text x="305" y="945" text-anchor="middle" class="card" fill="#475569">公司内部 GPU</text>
<rect x="380" y="901" width="395" height="78" fill="#FAF5FF" stroke="#7C3AED" stroke-width="1"/>
<text x="577" y="921" text-anchor="middle" class="card" fill="#7C3AED">PostgresML</text>
<text x="577" y="943" text-anchor="middle" class="small" fill="#1E293B">模型驻留 DB 进程</text>
<text x="577" y="959" text-anchor="middle" class="small" fill="#1E293B">公司 GPU</text>
<rect x="775" y="901" width="395" height="78" fill="#F0FDF4" stroke="#16A34A" stroke-width="3"/>
<text x="972" y="921" text-anchor="middle" class="card" fill="#16A34A">★ 本课题</text>
<text x="972" y="943" text-anchor="middle" class="small" fill="#1E293B">达梦 + Ray + 公司 GPU</text>
<text x="972" y="959" text-anchor="middle" class="small" fill="#1E293B">Cortex 也是这一类</text>
<rect x="230" y="979" width="150" height="78" fill="#F1F5F9"/>
<text x="305" y="1023" text-anchor="middle" class="card" fill="#94A3B8">公网 / 第三方</text>
<rect x="380" y="979" width="395" height="78" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
<text x="577" y="999" text-anchor="middle" class="card" fill="#94A3B8">基本不成立</text>
<text x="577" y="1021" text-anchor="middle" class="small" fill="#1E293B">若调公网 API</text>
<text x="577" y="1037" text-anchor="middle" class="small" fill="#1E293B">推理已在进程外</text>
<rect x="775" y="979" width="395" height="78" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
<text x="972" y="999" text-anchor="middle" class="card" fill="#2563EB">pgai + OpenAI</text>
<text x="972" y="1021" text-anchor="middle" class="small" fill="#1E293B">数据出进程调公网 API</text>
<text x="972" y="1037" text-anchor="middle" class="small" fill="#1E293B">vLLM 在外部集群</text>
<text x="700" y="1081" text-anchor="middle" class="anno" fill="#16A34A">结论：达梦 + 公司内部 GPU 落在「进程外 · 公司内」格——属于本课题研究对象，与 GPU 在不在公司内部无关</text>
<text x="40" y="1136" class="src">来源：PostgresML 官方文档（进程内模型加载）· Cortex AISQL (SIGMOD 2026, arXiv:2511.07663) · pgai GitHub · 本课题定位见 AGENTS.md §1-§2</text>
</svg>