<text x="1349.0" y="175" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="end">AI_FILTER / AI_CLASSIFY（扩展）</text>
<text x="1031.0" y="198" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#1F2937" text-anchor="start">selectivity 未知、调用次数多</text>
<text x="800.0" y="224" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="middle">共同进入同一执行链路，上游数据组织与调度提交控制策略决定端到端性能。</text>
