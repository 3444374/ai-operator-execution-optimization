<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<rect width="1600" height="1000" fill="#F8FAFC"/>
<text x="64" y="58" font-family="Microsoft YaHei,Arial,sans-serif" font-size="28" font-weight="700" fill="#1F2937" text-anchor="start">研究方案：上游调度策略设计与端到端验证</text>
<text x="66" y="92" font-family="Microsoft YaHei,Arial,sans-serif" font-size="16" font-weight="400" fill="#475467" text-anchor="start">数据组织策略与调度提交控制策略构成上游优化核心，端到端验证包含耦合实验与写回瓶颈判定。</text>
