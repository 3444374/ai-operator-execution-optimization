<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<rect width="1600" height="1000" fill="#F8FAFC"/>
<text x="64" y="58" font-family="Microsoft YaHei,Arial,sans-serif" font-size="28" font-weight="700" fill="#1F2937" text-anchor="start">研究方案：三层上游执行策略与端到端评价</text>
<text x="66" y="92" font-family="Microsoft YaHei,Arial,sans-serif" font-size="16" font-weight="400" fill="#475467" text-anchor="start">计划层组织数据，运行层控制提交与路由，服务端形成动态 micro-batch；写回纳入端到端评价。</text>
<rect x="190.0" y="108" width="1220" height="126" rx="12" fill="#F8FAFC" stroke="#D8DEE8" stroke-width="1"/>
<text x="214.0" y="130" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="700" fill="#475467" text-anchor="start">三类数据库 AI workload</text>
<rect x="233.0" y="146" width="354" height="68" rx="10" fill="#FFFFFF" stroke="#2F6FEB" stroke-width="2"/>
<text x="251.0" y="174" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#2F6FEB" text-anchor="start">批量向量生成</text>
<text x="569.0" y="175" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="end">AI_EMBED</text>
<text x="251.0" y="198" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#1F2937" text-anchor="start">向量维度、batch 均衡、写回压力</text>
<rect x="623.0" y="146" width="354" height="68" rx="10" fill="#FFFFFF" stroke="#F97316" stroke-width="2"/>
<text x="641.0" y="174" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#F97316" text-anchor="start">AI 谓词过滤 / 分类</text>
<text x="959.0" y="175" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="end">AI_FILTER / AI_CLASSIFY</text>
<text x="641.0" y="198" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#1F2937" text-anchor="start">selectivity 未知、调用次数多</text>
<rect x="1013.0" y="146" width="354" height="68" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
<text x="1031.0" y="174" font-family="Microsoft YaHei,Arial,sans-serif" font-size="15" font-weight="700" fill="#7C3AED" text-anchor="start">离线文本生成</text>
<text x="1349.0" y="175" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="end">AI_COMPLETE</text>
<text x="1031.0" y="198" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#1F2937" text-anchor="start">token 长度不均、prefix 共享</text>
<text x="800.0" y="224" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="middle">共同进入同一执行链路，约束 batch、partition、K_max、routing、micro-batch 与写回占比</text>
<polygon points="800.0,246 792.0,234 808.0,234" fill="#D8DEE8"/>
<rect x="160.0" y="262" width="1280" height="340" rx="14" fill="#F1F5F9" stroke="#D8DEE8" stroke-width="1"/>
