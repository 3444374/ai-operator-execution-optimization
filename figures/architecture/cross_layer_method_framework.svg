<text x="800.0" y="576.2" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#1F2937" text-anchor="middle">端到端评价：加入写回后，耗时、吞吐、排队等待、GPU 利用率和写回占比整体改善</text>
<rect x="510.0" y="622" width="580" height="156" rx="12" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
