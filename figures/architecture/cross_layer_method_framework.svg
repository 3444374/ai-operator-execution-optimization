<text x="383.0" y="480.2" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="middle">object 合并与 fan-in 形态选择</text>
<rect x="625.0" y="318" width="350" height="216" rx="12" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
<circle cx="655.0" cy="346" r="16" fill="#64748B"/>
