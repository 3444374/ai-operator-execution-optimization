<text x="566.0" y="652" font-family="Microsoft YaHei,Arial,sans-serif" font-size="18" font-weight="700" fill="#64748B" text-anchor="start">写回约束：瓶颈判定</text>
<text x="976.0" y="650" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="start">端到端 guardrail</text>
