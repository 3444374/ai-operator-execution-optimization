<rect x="528.0" y="708" width="544" height="24" rx="6" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1"/>
<text x="800.0" y="724.2" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="middle">COPY + deferred index 工程最优 baseline</text>
<rect x="528.0" y="738" width="544" height="24" rx="6" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1"/>
<text x="800.0" y="754.2" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#475467" text-anchor="middle">防止写回吞噬上游调度收益</text>
<rect x="250.0" y="802" width="1100" height="44" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1"/>
<text x="800.0" y="828.2" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#16A34A" text-anchor="middle">端到端效果指标：耗时 · rows/s · tokens/s · queue wait · micro-batch · writeback ratio · GPU utilization</text>
<text x="800.0" y="880" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#475467" text-anchor="middle">图注：研究方案图。先对三类数据库 AI 算子做分阶段性能剖析，再调优计划层数据组织、运行层提交路由和服务端动态批处理。</text>
<text x="800.0" y="900" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#475467" text-anchor="middle">结果写回纳入端到端评价，用于判断上游调优收益是否被持久化阶段吞噬。</text>
</svg>