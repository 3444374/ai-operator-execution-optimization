<text x="72" y="526" font-family="Microsoft YaHei,Arial,sans-serif" font-size="12" font-weight="400" fill="#334155" text-anchor="start">图注：每条规则必须对应可观测信号、可执行配置和防止副作用的保护约束；本表是候选策略，不代表已证明结论。</text>
