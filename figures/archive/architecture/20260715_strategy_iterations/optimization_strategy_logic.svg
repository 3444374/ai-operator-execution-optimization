<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
<rect width="1800" height="1120" fill="#F8FAFC"/>
<text x="64" y="66" font-family="Microsoft YaHei,Arial,sans-serif" font-size="30" font-weight="700" fill="#172033" text-anchor="start">优化策略设计：Ours-v0 规则表驱动上游执行策略</text>
<text x="66" y="100" font-family="Microsoft YaHei,Arial,sans-serif" font-size="16" font-weight="400" fill="#334155" text-anchor="start">策略不是重新实现数据库优化器或推理引擎；它在已定位瓶颈之后，用 workload 特征和模型服务状态选择上游执行配置，并用端到端指标回填规则表。</text>
