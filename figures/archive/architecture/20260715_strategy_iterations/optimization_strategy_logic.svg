<text x="92" y="1064" font-family="Microsoft YaHei,Arial,sans-serif" font-size="13" font-weight="400" fill="#334155" text-anchor="start">图注：Ours-v0 策略逻辑图。左侧输入来自前置阶段画像；中间规则表结合文献机制、本地画像和参数 sweep；右侧输出可执行配置，底部用包含写回的端到端指标回填规则。</text>
